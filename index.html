<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自習室預約系統 (Vanilla JS 版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
    <!-- Header -->
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 py-6 flex flex-col md:flex-row md:items-center justify-between gap-4">
            <div>
                <h1 class="text-2xl font-semibold tracking-tight text-slate-800">自習室預約系統</h1>
                <p class="text-slate-500 text-sm mt-1 italic font-serif">Quiet Study Room (Vanilla Version)</p>
            </div>
            
            <div id="slot-tabs" class="flex bg-slate-100 p-1 rounded-lg">
                <button onclick="changeSlot('Morning')" id="btn-Morning" class="slot-btn px-4 py-2 rounded-md text-sm font-medium transition-all bg-white text-blue-600 shadow-sm">上午代</button>
                <button onclick="changeSlot('Afternoon')" id="btn-Afternoon" class="slot-btn px-4 py-2 rounded-md text-sm font-medium transition-all text-slate-500 hover:text-slate-700">下午</button>
                <button onclick="changeSlot('Evening')" id="btn-Evening" class="slot-btn px-4 py-2 rounded-md text-sm font-medium transition-all text-slate-500 hover:text-slate-700">晚上</button>
            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Left: Seat Grid & List -->
        <section class="lg:col-span-2 space-y-8">
            <!-- Stats -->
            <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-slate-50 rounded-xl p-4 border border-slate-100 text-center">
                        <div class="text-xs text-slate-500 font-medium mb-1">總預約數</div>
                        <div id="stat-total" class="text-2xl font-bold text-slate-800">0</div>
                    </div>
                    <div class="bg-blue-50 rounded-xl p-4 border border-blue-100 text-center">
                        <div class="text-xs text-blue-600 font-medium mb-1">預約中</div>
                        <div id="stat-active" class="text-2xl font-bold text-blue-700">0</div>
                    </div>
                    <div class="bg-slate-100 rounded-xl p-4 border border-slate-200 text-center">
                        <div class="text-xs text-slate-600 font-medium mb-1">已結束</div>
                        <div id="stat-done" class="text-2xl font-bold text-slate-700">0</div>
                    </div>
                </div>
            </div>

            <!-- Seat Layout -->
            <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-medium flex items-center gap-2">
                        <i data-lucide="armchair" class="w-5 h-5 text-slate-400"></i>
                        座位佈局 (<span id="current-slot-label">上午</span>)
                    </h2>
                </div>
                <div id="seat-grid" class="grid grid-cols-4 sm:grid-cols-6 gap-3">
                    <!-- Seats generated by JS -->
                </div>
            </div>

            <!-- List & Filters -->
            <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-6">
                    <h2 class="text-lg font-medium flex items-center gap-2">
                        <i data-lucide="check-circle-2" class="w-5 h-5 text-slate-400"></i>
                        預約列表
                    </h2>
                    
                    <div class="flex flex-col items-end gap-2 self-start">
                        <div id="inline-stats" class="text-[10px] font-mono text-slate-400 uppercase tracking-wider">
                            active: 0 | done: 0 | total: 0
                        </div>
                        <div class="flex bg-slate-100 p-1 rounded-lg">
                            <button onclick="setFilter('all')" id="filter-all" class="filter-btn px-3 py-1.5 rounded-md text-xs font-medium transition-all bg-white text-blue-600 shadow-sm">全部</button>
                            <button onclick="setFilter('active')" id="filter-active" class="filter-btn px-3 py-1.5 rounded-md text-xs font-medium transition-all text-slate-500">預約中</button>
                            <button onclick="setFilter('done')" id="filter-done" class="filter-btn px-3 py-1.5 rounded-md text-xs font-medium transition-all text-slate-500">已結束</button>
                        </div>
                    </div>
                </div>
                
                <div id="reservation-list" class="space-y-3">
                    <!-- List items generated by JS -->
                </div>
            </div>
        </section>

        <!-- Right: Submit Form -->
        <section class="space-y-6">
            <div class="bg-white rounded-2xl border border-slate-200 p-6 shadow-sm">
                <h2 class="text-lg font-medium mb-6 flex items-center gap-2">
                    <i data-lucide="clock" class="w-5 h-5 text-slate-400"></i>
                    提交預約
                </h2>

                <form id="reservation-form" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">選擇時段</label>
                        <div id="form-slot-display" class="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-lg text-slate-600 text-sm">
                            上午 (08:00 - 12:00)
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">座位號碼</label>
                        <div id="form-seat-display" class="w-full px-3 py-2 border rounded-lg text-sm bg-slate-50 border-slate-200 text-slate-400">
                            請在左側點選座位
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">您的暱稱</label>
                        <div class="relative">
                            <i data-lucide="user" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                            <input
                                id="nickname-input"
                                type="text"
                                placeholder="輸入暱稱..."
                                required
                                class="w-full pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all"
                            />
                        </div>
                    </div>

                    <button
                        type="submit"
                        id="submit-btn"
                        disabled
                        class="w-full py-2.5 bg-slate-900 text-white rounded-lg text-sm font-medium hover:bg-slate-800 disabled:bg-slate-200 disabled:text-slate-400 disabled:cursor-not-allowed transition-all shadow-sm"
                    >
                        確認預約
                    </button>
                </form>
            </div>
        </section>
    </main>

    <script>
        // Constants
        const TOTAL_SEATS = 24;
        const LS_KEY = "records";

        // Global State
        let currentSlot = "Morning";
        let selectedSeat = null;
        let currentFilter = "all";

        // 6. JS 必須有 3 個分離 function
        function loadData() {
            const data = localStorage.getItem(LS_KEY);
            return data ? JSON.parse(data) : [];
        }

        function saveData(newRecord) {
            const records = loadData();
            records.push(newRecord);
            localStorage.setItem(LS_KEY, JSON.stringify(records));
        }

        function updateRecordStatus(id) {
            const records = loadData();
            const index = records.findIndex(r => r.id === id);
            if (index !== -1) {
                records[index].status = records[index].status === "active" ? "done" : "active";
                localStorage.setItem(LS_KEY, JSON.stringify(records));
                renderApp();
            }
        }

        function changeSlot(slot) {
            currentSlot = slot;
            selectedSeat = null;
            
            // Update UI tabs
            document.querySelectorAll('.slot-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'text-blue-600', 'shadow-sm');
                btn.classList.add('text-slate-500');
            });
            const activeBtn = document.getElementById(`btn-${slot}`);
            activeBtn.classList.add('bg-white', 'text-blue-600', 'shadow-sm');
            activeBtn.classList.remove('text-slate-500');

            // Update displays
            const labels = { "Morning": "上午 (08:00 - 12:00)", "Afternoon": "下午 (13:00 - 17:00)", "Evening": "晚上 (18:00 - 22:00)" };
            document.getElementById('current-slot-label').innerText = slot === "Morning" ? "上午" : slot === "Afternoon" ? "下午" : "晚上";
            document.getElementById('form-slot-display').innerText = labels[slot];
            
            renderApp();
            updateSeatDisplay();
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'text-blue-600', 'shadow-sm');
                btn.classList.add('text-slate-500');
            });
            const activeFilter = document.getElementById(`filter-${filter}`);
            activeFilter.classList.add('bg-white', 'text-blue-600', 'shadow-sm');
            activeFilter.classList.remove('text-slate-500');
            
            renderList();
        }

        function updateSeatDisplay() {
            const display = document.getElementById('form-seat-display');
            const submitBtn = document.getElementById('submit-btn');
            if (selectedSeat) {
                display.innerText = `已選中第 ${selectedSeat} 號座位`;
                display.className = "w-full px-3 py-2 border rounded-lg text-sm bg-blue-50 border-blue-200 text-blue-700";
                submitBtn.disabled = false;
            } else {
                display.innerText = "請在左側點選座位";
                display.className = "w-full px-3 py-2 border rounded-lg text-sm bg-slate-50 border-slate-200 text-slate-400";
                submitBtn.disabled = true;
            }
        }

        function selectSeat(id) {
            selectedSeat = id;
            updateSeatDisplay();
            renderSeats();
        }

        function renderSeats() {
            const records = loadData();
            const grid = document.getElementById('seat-grid');
            grid.innerHTML = '';

            for (let i = 1; i <= TOTAL_SEATS; i++) {
                const activeRes = records.find(r => r.seat === i && r.timeSlot === currentSlot && r.status === "active");
                const isSelected = selectedSeat === i;
                const isReserved = !!activeRes;

                const btn = document.createElement('button');
                btn.className = `relative aspect-square rounded-xl border flex flex-col items-center justify-center transition-all ${
                    isReserved 
                    ? "bg-slate-100 border-slate-200 text-slate-400 cursor-not-allowed" 
                    : isSelected 
                    ? "bg-blue-500 border-blue-600 text-white shadow-md" 
                    : "bg-white border-slate-200 text-slate-600 hover:border-blue-300 hover:bg-blue-50"
                }`;
                
                if (!isReserved) {
                    btn.onclick = () => selectSeat(i);
                } else {
                    btn.disabled = true;
                }

                btn.innerHTML = `
                    <span class="text-xs font-mono opacity-60 mb-1">${i.toString().padStart(2, '0')}</span>
                    <i data-lucide="armchair" class="w-5 h-5 ${isSelected ? "text-white" : isReserved ? "text-slate-300" : "text-slate-400"}"></i>
                    ${isReserved ? `<div class="absolute inset-0 flex items-end justify-center pb-1"><span class="text-[10px] truncate px-1 w-full text-center">${activeRes.reserver}</span></div>` : ''}
                `;
                grid.appendChild(btn);
            }
            lucide.createIcons();
        }

        function renderList() {
            const records = loadData();
            const listContainer = document.getElementById('reservation-list');
            listContainer.innerHTML = '';

            const filtered = records.filter(r => {
                if (currentFilter === "all") return true;
                return r.status === currentFilter;
            }).sort((a, b) => {
                if (a.status === b.status) return new Date(b.createdAt) - new Date(a.createdAt);
                return a.status === "active" ? -1 : 1;
            });

            if (filtered.length === 0) {
                listContainer.innerHTML = '<div class="text-center py-12 text-slate-400 text-sm italic">暫無預約記錄</div>';
            } else {
                filtered.forEach(res => {
                    const item = document.createElement('div');
                    const isDone = res.status === "done";
                    item.className = `p-4 rounded-xl border transition-all flex items-center justify-between ${
                        isDone ? "bg-slate-50 border-slate-100 opacity-60 grayscale" : "bg-white border-slate-200 shadow-sm"
                    }`;
                    
                    item.innerHTML = `
                        <div class="flex items-center gap-4">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center ${isDone ? "bg-slate-200" : "bg-blue-50 text-blue-600"}">
                                <i data-lucide="armchair" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <div class="flex items-center gap-2">
                                    <span class="font-medium text-slate-800">${res.reserver}</span>
                                    <span class="text-[10px] px-1.5 py-0.5 rounded-full font-bold uppercase ${isDone ? "bg-slate-200 text-slate-500" : "bg-blue-100 text-blue-700"}">
                                        ${res.status === "active" ? "進行中" : "已結束"}
                                    </span>
                                </div>
                                <div class="text-xs text-slate-500 mt-0.5">
                                    座位 ${res.seat.toString().padStart(2, '0')} • ${res.timeSlot === "Morning" ? "上午" : res.timeSlot === "Afternoon" ? "下午" : "晚上"}
                                </div>
                            </div>
                        </div>
                        <button onclick="updateRecordStatus('${res.id}')" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${
                            isDone ? "bg-slate-200 text-slate-600 hover:bg-slate-300" : "bg-slate-100 text-slate-700 hover:bg-blue-600 hover:text-white"
                        }">
                            ${res.status === "active" ? "標記為預約結束" : "恢復為進行中"}
                        </button>
                    `;
                    listContainer.appendChild(item);
                });
            }
            lucide.createIcons();
            
            // Update stats
            const stats = {
                total: records.length,
                active: records.filter(r => r.status === "active").length,
                done: records.filter(r => r.status === "done").length
            };
            document.getElementById('stat-total').innerText = stats.total;
            document.getElementById('stat-active').innerText = stats.active;
            document.getElementById('stat-done').innerText = stats.done;
            document.getElementById('inline-stats').innerText = `active: ${stats.active} | done: ${stats.done} | total: ${stats.total}`;
        }

        function renderApp() {
            renderSeats();
            renderList();
        }

        // Form Submission
        document.getElementById('reservation-form').onsubmit = (e) => {
            e.preventDefault();
            const nickname = document.getElementById('nickname-input').value.trim();
            if (!selectedSeat || !nickname) return;

            const newRecord = {
                id: Date.now() + "_" + Math.random().toString(36).slice(2, 6),
                createdAt: new Date().toISOString(),
                seat: selectedSeat,
                timeSlot: currentSlot,
                reserver: nickname,
                status: "active"
            };

            saveData(newRecord);
            
            // Success reset
            document.getElementById('nickname-input').value = "";
            selectedSeat = null;
            updateSeatDisplay();
            renderApp();
        };

        // Initial Load
        window.onload = () => {
            lucide.createIcons();
            renderApp();
        };
    </script>
</body>
</html>
